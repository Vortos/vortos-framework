groups:
  - name: vortos-alert-rules
    rules:
      - alert: VortosHighHttpErrorRate
        expr: vortos:http_request_error_rate5m > 0.05
        for: 10m
        labels:
          severity: page
          service: vortos
        annotations:
          summary: Vortos HTTP 5xx rate is above 5%
          description: The HTTP 5xx rate has been above 5% for 10 minutes.

      - alert: VortosHighHttpLatency
        expr: vortos:http_request_duration:p95_5m > 1000
        for: 10m
        labels:
          severity: ticket
          service: vortos
        annotations:
          summary: Vortos HTTP p95 latency is high
          description: HTTP p95 latency is above 1000 ms for route {{ $labels.route }}.

      - alert: VortosCqrsCommandLatencyHigh
        expr: vortos:cqrs_command_duration:p95_5m > 500
        for: 10m
        labels:
          severity: ticket
          service: vortos
        annotations:
          summary: Vortos CQRS command latency is high
          description: Command {{ $labels.command }} p95 latency is above 500 ms.

      - alert: VortosMessagingErrorRateHigh
        expr: vortos:messaging_error_rate5m > 0.02
        for: 10m
        labels:
          severity: page
          service: vortos
        annotations:
          summary: Vortos messaging error rate is high
          description: Messaging error rate is above 2% for 10 minutes.

      - alert: VortosDeadLetterMessagesPresent
        expr: sum(vortos_dlq_backlog_size) > 0
        for: 5m
        labels:
          severity: page
          service: vortos
        annotations:
          summary: Vortos dead-letter messages are present
          description: One or more messages were sent to the dead-letter path.

      - alert: VortosOutboxBacklogGrowing
        expr: sum(vortos_outbox_backlog_size{status="pending"}) > 100
        for: 10m
        labels:
          severity: page
          service: vortos
        annotations:
          summary: Vortos outbox backlog is growing
          description: Pending outbox messages are accumulating and may not be reaching the broker.

      - alert: VortosOutboxOldestPendingTooOld
        expr: max(vortos_outbox_oldest_pending_age_seconds) > 300
        for: 5m
        labels:
          severity: page
          service: vortos
        annotations:
          summary: Vortos outbox has old pending messages
          description: The oldest pending outbox message is older than 5 minutes.

      - alert: VortosDlqOldestFailedTooOld
        expr: max(vortos_dlq_oldest_failed_age_seconds) > 900
        for: 5m
        labels:
          severity: ticket
          service: vortos
        annotations:
          summary: Vortos DLQ contains unresolved failures
          description: A failed message has remained in the DLQ for more than 15 minutes.

      - alert: VortosPersistenceLatencyHigh
        expr: vortos:db_query_duration:p95_5m > 250
        for: 15m
        labels:
          severity: ticket
          service: vortos
        annotations:
          summary: Vortos persistence query latency is high
          description: Persistence query p95 latency is above 250 ms.

      - alert: VortosSecurityFailuresSpike
        expr: sum(rate(vortos_security_events_total{result="denied"}[5m])) > 5
        for: 10m
        labels:
          severity: page
          service: vortos
        annotations:
          summary: Vortos security denial rate is elevated
          description: Security denials are above 5 per second for 10 minutes.
