policies:
  - name: Vortos Production
    incident_preference: PER_CONDITION
    conditions:
      - name: Vortos high HTTP 5xx rate
        type: nrql
        query: |
          SELECT percentage(sum(vortos_http_requests_total), WHERE status LIKE '5%') FROM Metric
        threshold:
          operator: above
          value: 5
          duration_minutes: 10
        severity: critical

      - name: Vortos high CQRS command latency
        type: nrql
        query: |
          SELECT percentile(vortos_cqrs_command_duration_ms, 95) FROM Metric FACET command
        threshold:
          operator: above
          value: 500
          duration_minutes: 10
        severity: warning

      - name: Vortos outbox backlog growing
        type: nrql
        query: |
          SELECT sum(vortos_outbox_backlog_size) FROM Metric WHERE status = 'pending'
        threshold:
          operator: above
          value: 100
          duration_minutes: 10
        severity: critical

      - name: Vortos DLQ messages present
        type: nrql
        query: |
          SELECT sum(vortos_dlq_backlog_size) FROM Metric
        threshold:
          operator: above
          value: 0
          duration_minutes: 5
        severity: critical

      - name: Vortos security denial spike
        type: nrql
        query: |
          SELECT rate(sum(vortos_security_events_total), 1 minute) FROM Metric WHERE result = 'denied'
        threshold:
          operator: above
          value: 5
          duration_minutes: 10
        severity: critical
