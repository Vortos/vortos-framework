# =============================================================================
# Production baseline stack — edge-router blue-green topology.
#
# This file brings up the DURABLE layer of the box: infrastructure, the edge
# router, and the least-privilege Docker API proxy the deploy uses. It does NOT
# bring up the application — the app runs as internal-only blue/green colors
# (services `app-blue` / `app-green`, project `vortos-app-<color>`) that the
# deploy pipeline creates and cuts over. Publishing 80/443 from an app service
# here would collide with the edge and defeat zero-downtime cutover, so the app
# is deliberately absent.
#
#   operator (once):   docker compose -f docker-compose.prod.yaml up -d
#   deploy (per release): brings up the next color, health-gates it, then
#                         repoints the edge — see vortos-deploy.
#
# `vortos-net` is EXTERNAL and shared with the color projects + the edge
# (create it once: `docker network create vortos-net`; first-deploy
# provisioning also ensures it). The deploy reaches Docker only through
# `docker-socket-proxy` (a narrow API allowlist) — never the raw socket.
# =============================================================================
services:
  edge:
    # The edge owns 80/443 and reverse-proxies to the active color over vortos-net.
    # Its admin API (loopback + vortos-net) is how the deploy repoints upstreams at cutover.
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Admin API bound on the internal network so the on-box deploy container can POST the
      # cutover config to http://edge:2019. vortos-net is never published, so it is not exposed.
      CADDY_ADMIN: "0.0.0.0:2019"
    networks:
      - vortos-net

  docker-socket-proxy:
    # Least-privilege Docker API for the deploy one-shots. The raw /var/run/docker.sock is mounted
    # ONLY here (read-only) and NEVER into the application image. The env below is a strict allowlist:
    # only the endpoints the blue-green cutover needs are enabled; everything else is denied.
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: always
    environment:
      # --- allowed (what `docker compose up -d` + pull + health inspect require) ---
      CONTAINERS: "1"
      IMAGES: "1"
      NETWORKS: "1"
      EXEC: "1"
      POST: "1"
      INFO: "1"
      VERSION: "1"
      # --- explicitly denied (dangerous / unused) ---
      VOLUMES: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      SECRETS: "0"
      SWARM: "0"
      SERVICES: "0"
      TASKS: "0"
      NODES: "0"
      PLUGINS: "0"
      SYSTEM: "0"
      DISTRIBUTION: "0"
      SESSION: "0"
      AUTH: "0"
      LOG_LEVEL: "warning"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vortos-net

  write_db:
    image: postgres:18-alpine
    volumes:
      - write_db_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - vortos-net
    environment:
      POSTGRES_USER:     ${VORTOS_WRITE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${VORTOS_WRITE_DB_PASSWORD}
      POSTGRES_DB:       ${VORTOS_WRITE_DB_NAME}
    env_file:
      - ./.env.prod
    restart: always

  redis:
    image: redis:alpine
    networks:
      - vortos-net
    volumes:
      - redis_data:/data
    env_file:
      - ./.env.prod
    restart: always

  read_db:
    image: mongo:8.0
    networks:
      - vortos-net
    volumes:
      - read_db_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${VORTOS_READ_DB_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${VORTOS_READ_DB_PASSWORD}
    env_file:
      - ./.env.prod
    restart: always

  read_pg:
    image: postgres:18-alpine
    volumes:
      - read_pg_data:/var/lib/postgresql
    networks:
      - vortos-net
    environment:
      POSTGRES_USER:     ${VORTOS_READ_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${VORTOS_READ_DB_PASSWORD}
      POSTGRES_DB:       ${VORTOS_READ_DB_NAME}
    env_file:
      - ./.env.prod
    restart: always

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    networks:
      - vortos-net
    restart: always

networks:
  vortos-net:
    external: true

volumes:
  write_db_data:
  read_db_data:
  read_pg_data:
  redis_data:
  caddy_data:
  caddy_config:
