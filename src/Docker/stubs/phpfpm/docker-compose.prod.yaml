services:
  backend:
    build:
      context: ./
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    networks:
      - vortos-net
    env_file:
      - ./.env.prod
    restart: always

  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vortos-net
    depends_on:
      - backend
    restart: always

  write_db:
    image: postgres:18-alpine
    volumes:
      - write_db_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - vortos-net
    environment:
      POSTGRES_USER:     ${VORTOS_WRITE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${VORTOS_WRITE_DB_PASSWORD}
      POSTGRES_DB:       ${VORTOS_WRITE_DB_NAME}
    env_file:
      - ./.env.prod
    restart: always

  redis:
    image: redis:alpine
    networks:
      - vortos-net
    volumes:
      - redis_data:/data
    env_file:
      - ./.env.prod
    restart: always

  read_db:
    image: mongo:8.0
    networks:
      - vortos-net
    volumes:
      - read_db_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${VORTOS_READ_DB_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${VORTOS_READ_DB_PASSWORD}
    env_file:
      - ./.env.prod
    restart: always

  read_pg:
    image: postgres:18-alpine
    volumes:
      - read_pg_data:/var/lib/postgresql
    networks:
      - vortos-net
    environment:
      POSTGRES_USER:     ${VORTOS_READ_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${VORTOS_READ_DB_PASSWORD}
      POSTGRES_DB:       ${VORTOS_READ_DB_NAME}
    env_file:
      - ./.env.prod
    restart: always

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    networks:
      - vortos-net
    restart: always

  worker:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: worker
    restart: always
    volumes:
      - ./:/var/www/html
    depends_on:
      - kafka
      - write_db
      - redis
    networks:
      - vortos-net
    env_file:
      - ./.env.prod
    healthcheck:
      disable: true

networks:
  vortos-net:
    driver: bridge

volumes:
  write_db_data:
  read_db_data:
  read_pg_data:
  redis_data:
